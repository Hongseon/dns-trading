name: Keep Render Awake
on:
  schedule:
    # Ping every 5 minutes so the free Render web service does not sleep.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "RENDER_HEALTHCHECK_URL is not set; skipping keepalive ping."
            exit 0
          fi

          # Render free tier cold-starts can take 30-60s.
          # Use generous timeout + retries so the first attempt wakes the server.
          # Keepalive failure is non-critical -- never fail the workflow.
          curl --fail --silent --show-error \
            --location \
            --max-time 90 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --header "User-Agent: GitHubActions-RenderKeepAlive/1.0" \
            "$HEALTHCHECK_URL" \
            && echo "Ping succeeded" \
            || echo "Ping failed (non-critical)"
