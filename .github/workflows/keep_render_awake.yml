name: Keep Render Awake
on:
  schedule:
    # Ping every 5 minutes so the free Render web service does not sleep.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
          WARMUP_URL: ${{ secrets.RENDER_WARMUP_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "RENDER_HEALTHCHECK_URL is not set; skipping keepalive ping."
            exit 0
          fi

          EFFECTIVE_WARMUP_URL="$WARMUP_URL"
          if [ -z "$EFFECTIVE_WARMUP_URL" ]; then
            if [ "${HEALTHCHECK_URL%/health}" != "$HEALTHCHECK_URL" ]; then
              EFFECTIVE_WARMUP_URL="${HEALTHCHECK_URL%/health}/warmup"
            else
              EFFECTIVE_WARMUP_URL="${HEALTHCHECK_URL%/}/warmup"
            fi
          fi

          echo "Health URL: $HEALTHCHECK_URL"
          echo "Warmup URL: $EFFECTIVE_WARMUP_URL"
          echo "Pinging health endpoint..."

          curl --fail --silent --show-error \
            --location \
            --connect-timeout 15 \
            --max-time 60 \
            --retry 2 \
            --retry-all-errors \
            --retry-delay 15 \
            --retry-max-time 120 \
            --header "User-Agent: GitHubActions-RenderKeepAlive/1.0" \
            "$HEALTHCHECK_URL"

          echo "Pinging warmup endpoint..."
          warmup_status=$(curl --silent --show-error \
            --location \
            --connect-timeout 10 \
            --max-time 20 \
            --retry 1 \
            --retry-all-errors \
            --retry-delay 5 \
            --retry-max-time 30 \
            --output /tmp/render-warmup-response.txt \
            --write-out "%{http_code}" \
            --header "User-Agent: GitHubActions-RenderKeepAlive/1.0" \
            "$EFFECTIVE_WARMUP_URL")

          echo "Warmup HTTP status: $warmup_status"
          cat /tmp/render-warmup-response.txt

          if [ "$warmup_status" = "404" ]; then
            echo "Warmup endpoint is not available on the deployed service yet; keeping health-only mode."
            exit 0
          fi

          if [ "$warmup_status" != "200" ]; then
            echo "Warmup request failed with HTTP $warmup_status"
            exit 1
          fi
