name: Keep Render Awake
on:
  schedule:
    # Ping every 5 minutes so the free Render web service does not sleep.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    if: ${{ secrets.RENDER_HEALTHCHECK_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          curl --fail --silent --show-error \
            --location \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            --header "User-Agent: GitHubActions-RenderKeepAlive/1.0" \
            "$HEALTHCHECK_URL"
