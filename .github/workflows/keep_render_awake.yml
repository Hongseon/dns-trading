name: Keep Render Awake
on:
  schedule:
    # Ping every 5 minutes so the free Render web service does not sleep.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "RENDER_HEALTHCHECK_URL is not set; skipping keepalive ping."
            exit 0
          fi

          curl --fail --silent --show-error \
            --location \
            --connect-timeout 10 \
            --max-time 60 \
            --retry 2 \
            --retry-all-errors \
            --retry-delay 20 \
            --retry-max-time 240 \
            --header "User-Agent: GitHubActions-RenderKeepAlive/1.0" \
            "$HEALTHCHECK_URL"
