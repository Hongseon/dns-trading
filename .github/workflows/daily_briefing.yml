name: Daily Briefing
on:
  schedule:
    # UTC Mon-Fri 10:00 = KST Mon-Fri 19:00
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      briefing_type:
        description: 'Briefing type'
        required: false
        default: 'daily'
        type: choice
        options: [daily, yesterday, weekly, last_week, monthly, last_month]

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate required secrets
        id: preflight
        env:
          ZILLIZ_URI: ${{ secrets.ZILLIZ_URI }}
          ZILLIZ_TOKEN: ${{ secrets.ZILLIZ_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          missing=()
          for name in ZILLIZ_URI ZILLIZ_TOKEN GEMINI_API_KEY; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Skipping Daily Briefing; missing required secrets: ${missing[*]}"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - if: steps.preflight.outputs.ready == 'true'
        uses: actions/checkout@v4
      - if: steps.preflight.outputs.ready == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - if: steps.preflight.outputs.ready == 'true'
        name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
      - if: steps.preflight.outputs.ready == 'true'
        run: python -m pip install --upgrade pip
      - if: steps.preflight.outputs.ready == 'true'
        run: pip install -r requirements.txt

      - if: steps.preflight.outputs.ready == 'true'
        name: Determine briefing type
        id: briefing
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.briefing_type }}" >> "$GITHUB_OUTPUT"
          else
            # Use KST day-of-week: 5=Friday → weekly, else → daily
            KST_DOW=$(TZ=Asia/Seoul date +%u)
            if [ "$KST_DOW" = "5" ]; then
              echo "type=weekly" >> "$GITHUB_OUTPUT"
            else
              echo "type=daily" >> "$GITHUB_OUTPUT"
            fi
          fi

      - if: steps.preflight.outputs.ready == 'true'
        name: Generate and send briefing
        run: python scripts/run_briefing.py ${{ steps.briefing.outputs.type }}
        env:
          ZILLIZ_URI: ${{ secrets.ZILLIZ_URI }}
          ZILLIZ_TOKEN: ${{ secrets.ZILLIZ_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
