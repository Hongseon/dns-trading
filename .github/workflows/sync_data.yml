name: Data Sync
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate required secrets
        id: preflight
        env:
          ZILLIZ_URI: ${{ secrets.ZILLIZ_URI }}
          ZILLIZ_TOKEN: ${{ secrets.ZILLIZ_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          NAVER_EMAIL: ${{ secrets.NAVER_EMAIL }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          missing=()
          for name in ZILLIZ_URI ZILLIZ_TOKEN NAVER_EMAIL NAVER_PASSWORD GEMINI_API_KEY; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          has_refresh_flow=true
          for name in DROPBOX_APP_KEY DROPBOX_APP_SECRET DROPBOX_REFRESH_TOKEN; do
            if [ -z "${!name}" ]; then
              has_refresh_flow=false
            fi
          done

          if [ -z "$DROPBOX_ACCESS_TOKEN" ] && [ "$has_refresh_flow" != "true" ]; then
            missing+=("DROPBOX_ACCESS_TOKEN or DROPBOX_APP_KEY+DROPBOX_APP_SECRET+DROPBOX_REFRESH_TOKEN")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Skipping Data Sync; missing required secrets: ${missing[*]}"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - if: steps.preflight.outputs.ready == 'true'
        uses: actions/checkout@v5
      - if: steps.preflight.outputs.ready == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements-actions-sync.txt
      - if: steps.preflight.outputs.ready == 'true'
        run: python -m pip install --upgrade pip
      - if: steps.preflight.outputs.ready == 'true'
        run: pip install -r requirements-actions-sync.txt
      - if: steps.preflight.outputs.ready == 'true'
        run: python scripts/full_sync.py
        env:
          ZILLIZ_URI: ${{ secrets.ZILLIZ_URI }}
          ZILLIZ_TOKEN: ${{ secrets.ZILLIZ_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_FOLDER_PATH: ${{ secrets.DROPBOX_FOLDER_PATH }}
          NAVER_EMAIL: ${{ secrets.NAVER_EMAIL }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OCR_ENABLED: "false"
